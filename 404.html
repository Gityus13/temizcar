<style>
:root {
  --blue-900: #050e1a;
  --blue-800: #0a1f35;
  --blue-700: #0d2d4f;
  --blue-600: #0e3d6b;
  --blue-500: #1565a8;
  --blue-400: #2d87d4;
  --blue-300: #5aade8;
  --blue-200: #93cdf0;
  --blue-100: #d6edfa;
  --teal-400: #14b8a6;
  --teal-300: #5eead4;
  --white: #ffffff;
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: var(--font-body);
  background: var(--blue-900);
  color: white;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  position: relative;
}
a { text-decoration: none; color: inherit; }

/* ── Mesh background ── */
.bg-mesh {
  position: fixed; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 60% at 20% 30%, rgba(13,61,107,0.9) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 70%, rgba(21,101,168,0.55) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 50% 5%,  rgba(20,184,166,0.12) 0%, transparent 60%),
    var(--blue-900);
}

/* ── Grid ── */
.bg-grid {
  position: fixed; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(90,173,232,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(90,173,232,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
}

/* ── Floating orbs ── */
.orb {
  position: fixed; border-radius: 50%; pointer-events: none; filter: blur(80px);
  animation: orbFloat 12s ease-in-out infinite;
}
.orb-1 { width: 500px; height: 500px; background: rgba(13,61,107,0.8);  top: -150px; left: -150px; animation-delay: 0s; }
.orb-2 { width: 350px; height: 350px; background: rgba(45,135,212,0.22); bottom: -100px; right: -100px; animation-delay: 4s; }
.orb-3 { width: 250px; height: 250px; background: rgba(20,184,166,0.15); top: 40%; left: 60%; animation-delay: 8s; }
@keyframes orbFloat {
  0%,100%{ transform: translate(0,0) scale(1); }
  33%{ transform: translate(25px,-18px) scale(1.04); }
  66%{ transform: translate(-18px,22px) scale(0.97); }
}

/* ── Rain ── */
.rain-wrap { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
.rd {
  position: absolute; top: -30px; width: 1px;
  background: linear-gradient(to bottom, transparent, rgba(147,205,240,0.3));
  border-radius: 2px;
  animation: rainFall linear infinite;
}
@keyframes rainFall { to { transform: translateY(115vh); } }

/* ── Noise ── */
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* ── Main content ── */
.wrap {
  position: relative; z-index: 10;
  text-align: center;
  padding: 2rem 1.5rem;
  max-width: 600px;
  width: 100%;
  display: flex; flex-direction: column; align-items: center; gap: 0;
}

/* ── Logo ── */
.logo {
  font-family: var(--font-display);
  font-size: 1.3rem; font-weight: 800;
  color: white; letter-spacing: -0.02em;
  display: flex; align-items: center; gap: 0.4rem;
  margin-bottom: 3.5rem;
  opacity: 0; animation: fadeUp 0.6s ease forwards 0.1s;
}
.logo span { color: var(--blue-300); }
.logo small { font-size: 0.55rem; color: rgba(255,255,255,0.3); font-weight: 400; letter-spacing: 0.05em; vertical-align: super; }

/* ── Dirty car SVG ── */
.car-wrap {
  width: min(360px, 88vw);
  margin-bottom: 2rem;
  opacity: 0; animation: fadeUp 0.7s ease forwards 0.2s;
  filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
}
.car-wrap svg { width: 100%; display: block; }

/* ── 404 number ── */
.four-o-four {
  font-family: var(--font-display);
  font-size: clamp(6rem, 20vw, 10rem);
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.04em;
  color: white;
  margin-bottom: 0.25rem;
  opacity: 0; animation: fadeUp 0.7s ease forwards 0.35s;
}
.four-o-four .accent { color: var(--blue-300); }

/* ── Tagline ── */
.tagline {
  font-size: clamp(1rem, 3vw, 1.25rem);
  font-weight: 600;
  color: rgba(255,255,255,0.7);
  margin-bottom: 0.75rem;
  opacity: 0; animation: fadeUp 0.7s ease forwards 0.45s;
}
.sub {
  font-size: 0.9rem;
  color: rgba(255,255,255,0.38);
  line-height: 1.7;
  max-width: 420px;
  margin-bottom: 2.5rem;
  opacity: 0; animation: fadeUp 0.7s ease forwards 0.55s;
}

/* ── Buttons ── */
.btns {
  display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
  opacity: 0; animation: fadeUp 0.7s ease forwards 0.65s;
}
.btn-primary {
  background: linear-gradient(135deg, var(--blue-400), var(--blue-300));
  color: white; padding: 0.85rem 2rem;
  border-radius: 12px; font-size: 0.9rem; font-weight: 700;
  letter-spacing: 0.02em;
  box-shadow: 0 4px 20px rgba(45,135,212,0.4);
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s;
  display: inline-flex; align-items: center; gap: 0.5rem;
}
.btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(45,135,212,0.55); }
.btn-ghost {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.75); padding: 0.85rem 2rem;
  border-radius: 12px; font-size: 0.9rem; font-weight: 600;
  transition: background 0.2s, border-color 0.2s, transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  display: inline-flex; align-items: center; gap: 0.5rem;
}
.btn-ghost:hover { background: rgba(255,255,255,0.1); border-color: rgba(90,173,232,0.4); transform: translateY(-3px); }

/* ── Quick links ── */
.quick-links {
  margin-top: 3rem;
  display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center;
  opacity: 0; animation: fadeUp 0.7s ease forwards 0.75s;
}
.qlink {
  color: rgba(255,255,255,0.35);
  font-size: 0.78rem; font-weight: 500;
  padding: 0.35rem 0.85rem;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.08);
  transition: color 0.2s, border-color 0.2s, background 0.2s;
}
.qlink:hover { color: var(--blue-200); border-color: rgba(90,173,232,0.3); background: rgba(90,173,232,0.08); }

/* ── Language switcher ── */
.lang-switcher {
  display: flex; align-items: center; gap: 0.4rem;
  flex-wrap: wrap; justify-content: center;
  margin-bottom: 2rem;
  opacity: 0; animation: fadeUp 0.6s ease forwards 0.15s;
}
.lang-btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.5);
  padding: 0.3rem 0.75rem;
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: 0.75rem; font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s;
  white-space: nowrap;
}
.lang-btn:hover { background: rgba(255,255,255,0.1); color: white; border-color: rgba(255,255,255,0.2); }
.lang-btn.active {
  background: rgba(90,173,232,0.18);
  border-color: rgba(90,173,232,0.45);
  color: var(--blue-200);
}

/* ── Countdown ── */
.redirect-note {
  margin-top: 2rem;
  font-size: 0.78rem; color: rgba(255,255,255,0.25);
  opacity: 0; animation: fadeUp 0.7s ease forwards 0.85s;
}
.redirect-note span { color: var(--blue-300); font-weight: 700; }

/* ── Bubbles ── */
.bubble {
  position: fixed; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.12), transparent 70%);
  pointer-events: none;
  animation: bubbleRise linear infinite;
}
@keyframes bubbleRise {
  0%  { transform: translateY(100vh) scale(0); opacity: 0; }
  5%  { opacity: 0.5; }
  95% { opacity: 0.2; }
  100%{ transform: translateY(-10vh) scale(1); opacity: 0; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes mudWobble {
  0%,100%{ transform: scaleX(1) scaleY(1); }
  50%{ transform: scaleX(1.04) scaleY(0.97); }
}
</style>
</head>

<script>
/* ── Rain ── */
(function buildRain() {
  const wrap = document.getElementById('rainWrap');
  for (let i = 0; i < 55; i++) {
    const d = document.createElement('div');
    d.className = 'rd';
    d.style.cssText = `left:${Math.random()*100}%;height:${Math.random()*55+18}px;animation-duration:${Math.random()*0.8+0.4}s;animation-delay:${Math.random()*4}s;opacity:${Math.random()*0.28+0.05}`;
    wrap.appendChild(d);
  }
})();

/* ── Bubbles ── */
setInterval(() => {
  const b = document.createElement('div');
  b.className = 'bubble';
  const sz = Math.random() * 28 + 6;
  b.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;animation-duration:${Math.random()*10+7}s;animation-delay:${Math.random()}s`;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 18000);
}, 900);

/* ── Countdown redirect ── */
let secs = 10;
const cdEl = document.getElementById('countdown');
let countTimer = setInterval(() => {
  secs--;
  cdEl.textContent = secs;
  if (secs <= 0) { clearInterval(countTimer); window.location.href = '/'; }
}, 1000);
['click','keydown','touchstart'].forEach(ev =>
  document.addEventListener(ev, () => {
    clearInterval(countTimer);
    document.getElementById('redirectNote').style.display = 'none';
  }, {once:true})
);

/* ── All 7 languages ── */
const LANGS = {
  az: {
    tagline: 'Səhifə tapılmadı — maşın kimi!',
    sub: 'Axtardığınız səhifə köçürülüb, silinib və ya heç mövcud olmayıb. Ana səhifəyə qayıdın, sizi oradan istiqamətləndirək.',
    btn1: 'Ana Səhifə', btn2: 'Əlaqə',
    ql1:'Necə İşləyir', ql2:'Qiymətlər', ql3:'Filiallar', ql4:'Rəylər', ql5:'FAQ', ql6:'Məxfilik',
    redirect: 'saniyə sonra avtomatik yönləndiriləcəksiniz',
    rtl: false
  },

/* ── Apply language ── */
function applyLang(l, btn) {
  const t = LANGS[l] || LANGS.az;

  document.getElementById('tagline').textContent = t.tagline;
  document.getElementById('sub').textContent     = t.sub;
  document.getElementById('btn1').textContent    = t.btn1;
  document.getElementById('btn2').textContent    = t.btn2;
  document.getElementById('ql1').textContent     = t.ql1;
  document.getElementById('ql2').textContent     = t.ql2;
  document.getElementById('ql3').textContent     = t.ql3;
  document.getElementById('ql4').textContent     = t.ql4;
  document.getElementById('ql5').textContent     = t.ql5;
  document.getElementById('ql6').textContent     = t.ql6;

  // Update redirect note (re-use live secs value)
  const note = document.getElementById('redirectNote');
  if (note.style.display !== 'none') {
    note.innerHTML = `<span id="countdown">${secs}</span> ${t.redirect}`;
  }

  // RTL toggle
  document.documentElement.lang = l;
  document.documentElement.dir  = t.rtl ? 'rtl' : 'ltr';

  // Active button state
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  // Persist choice
  localStorage.setItem('tcLang', l);
}

/* ── Auto-detect on load ── */
(function init() {
  const stored  = localStorage.getItem('tcLang');
  const browser = navigator.language.split('-')[0];
  const l = (stored && LANGS[stored]) ? stored : (LANGS[browser] ? browser : 'az');

  // Highlight correct button
  const btns = document.querySelectorAll('.lang-btn');
  const codes = ['az','ru','en','tr','de','fr','ar'];
  btns.forEach((b, i) => { if (codes[i] === l) b.classList.add('active'); });

  applyLang(l, null);
  // Re-set active btn after applyLang cleared nothing (btn param was null)
  btns.forEach((b, i) => { if (codes[i] === l) b.classList.add('active'); });
})();
</script>
